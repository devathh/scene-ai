app:
  name: scene-ai
  version: 0.0.1
  env: ${APP_ENV}

server:
  addr: :8090
  tls:
    enable: false
    server-cert-path: ./certs/server.crt
    server-key-path: ./certs/server.key
  read-timeout: 20s
  write-timeout: 20s
  idle-timeout: 30s

persistence:
  postgres:
    host: ${POSTGRES_HOST}
    port: ${POSTGRES_PORT}
    sslmode: disable
    dbname: ${POSTGRES_DBNAME}
    auth:
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
    conn:
      max-idles: 15
      max-opens: 5
      max-idle-time: 30m
      max-lifetime: 15m

cache:
  user-ttl: 15m
  scenario-generation-ttl: 30m
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    db: 0
    auth:
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}

jwt:
  access-ttl: 24h
  refresh-ttl: 168h
  private-key-path: ./jwtRS256.key
  public-key-path: ./jwtRS256.key.pub

openrouter:
  api-key: ${OR_APIKEY}
  scenario-prompt-path: ./prompts/SCENARIO_PROMPT.md
  scene-prompt-path: ./prompts/SCENE_PROMPT.md